<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>WebServarr - Requests</title>
<script src="/static/js/theme-loader.js"></script>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="/static/css/theme.css" rel="stylesheet"/>
<script>tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "primary": "rgb(var(--color-primary) / <alpha-value>)",
        "baltic-blue": "rgb(var(--color-primary) / <alpha-value>)",
        "cornflower-ocean": "rgb(var(--color-secondary) / <alpha-value>)",
        "steel-blue": "rgb(var(--color-accent) / <alpha-value>)",
        "frosted-blue": "rgb(var(--color-text) / <alpha-value>)",
        "bright": "rgb(var(--color-text-secondary) / <alpha-value>)",
        "background-dark": "rgb(var(--color-background) / <alpha-value>)",
      },
      fontFamily: {
        "display": ["var(--font-display)", "sans-serif"]
      },
    },
  },
}</script>
</head>
<body class="bg-background-dark text-frosted-blue min-h-screen flex flex-col lg:flex-row lg:overflow-hidden">
<div id="sidebar-root" class="hidden lg:block lg:w-64 lg:shrink-0"></div>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col min-h-0 lg:h-screen lg:overflow-hidden">
<div id="header-root" class="hidden lg:block lg:h-16"></div>
<!-- Overseerr Iframe -->
<div class="flex-1 overflow-hidden">
<div id="iframeContainer" class="w-full h-full">
<div id="iframePlaceholder" class="flex flex-col items-center justify-center h-full text-center text-steel-blue p-8">
<span class="material-symbols-outlined text-6xl mb-4 opacity-50">download</span>
<p class="text-lg mb-2">Loading Overseerr...</p>
<p class="text-sm">If Overseerr is not configured, set the URL in Settings > Integrations.</p>
</div>
</div>
</div>
</main>

<script src="/static/js/auth.js"></script>
<script src="/static/js/header.js?v=2"></script>
<script src="/static/js/sidebar.js?v=11"></script>
<script>
document.addEventListener('DOMContentLoaded', async function() {
    initSidebar('requests-embed');

    const user = await checkAuth();
    if (!user) return;
    showAdminNav(user.is_admin);
    loadSystemStatus();

    // Authenticate with Overseerr SSO before loading iframe
    try {
        await fetch('/api/integrations/overseerr-auth', { method: 'POST' });
    } catch (e) { /* SSO optional — iframe will show Overseerr login if it fails */ }

    // Load Overseerr URL from settings
    try {
        const resp = await fetch('/api/integrations/overseerr-url');
        if (resp.ok) {
            const data = await resp.json();
            if (data.url) {
                const container = document.getElementById('iframeContainer');
                container.innerHTML = '<iframe src="' + data.url + '" class="w-full h-full border-0" allow="fullscreen"></iframe>';
            }
        }
    } catch (e) {
        // Overseerr not configured — keep placeholder
    }
});
</script>
</body>
</html>
