<script>
// HMS Dashboard - Login Logic
document.addEventListener('DOMContentLoaded', async function() {
    // Apply branding from theme
    var theme = window.HMS_THEME || {};
    if (theme.app_name) {
        var el = document.getElementById('loginAppName');
        if (el) el.textContent = theme.app_name;
        document.title = theme.app_name + ' - Login';
    }
    if (theme.tagline) {
        var el = document.getElementById('loginTagline');
        if (el) el.textContent = theme.tagline;
    }

    // Hide simple auth form if disabled
    if (theme.features && theme.features.show_simple_auth === false) {
        var formEl = document.getElementById('loginForm');
        var children = formEl.children;
        for (var i = 0; i < children.length; i++) {
            var child = children[i];
            // Keep the Plex button (id="plexLoginBtn"), hide everything else
            if (child.id !== 'plexLoginBtn') {
                child.style.display = 'none';
            }
        }
    }

    // If already authenticated, redirect to dashboard
    try {
        const authResp = await fetch('/auth/check-session');
        const authData = await authResp.json();
        if (authData.authenticated) {
            window.location.href = '/';
            return;
        }
    } catch (e) { /* Not authenticated, show login form */ }

    // Handle login form submission
    const loginForm = document.getElementById('loginForm');
    loginForm.addEventListener('submit', async function(e) {
        e.preventDefault();

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        try {
            const response = await fetch('/auth/simple-login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username, password })
            });

            const data = await response.json();

            if (response.ok && data.success) {
                // Login successful, redirect to dashboard
                window.location.href = data.redirect || '/';
            } else {
                alert(data.detail || 'Login failed. Please check your credentials.');
            }
        } catch (error) {
            alert('Login error: ' + error.message);
        }
    });

    // Plex login via Authentik OIDC — full-page redirect, no popups.
    // Authentik auto-redirects to Plex OAuth, then back to /auth/callback.
    document.getElementById('plexLoginBtn').addEventListener('click', function() {
        window.location.href = '/auth/login';
    });
});
</script>
