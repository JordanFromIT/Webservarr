<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>WebServarr - Login</title>
<script src="/static/js/theme-loader.js"></script>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="/static/css/theme.css" rel="stylesheet"/>
<script>tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "primary": "rgb(var(--color-primary) / <alpha-value>)",
        "steel-blue": "rgb(var(--color-accent) / <alpha-value>)",
        "baltic-blue": "rgb(var(--color-primary) / <alpha-value>)",
        "cornflower-ocean": "rgb(var(--color-secondary) / <alpha-value>)",
        "background-dark": "rgb(var(--color-background) / <alpha-value>)",
      },
      fontFamily: {
        "display": ["var(--font-display)", "sans-serif"]
      },
    },
  },
}</script>
<style>
    .cinematic-overlay {
      background: radial-gradient(circle, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.9) 100%);
    }
    .login-glass-card {
      background: rgba(18, 20, 24, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(var(--color-accent) / 0.15);
    }
    .backdrop-slide {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      transition: opacity 1.5s ease-in-out;
      will-change: opacity;
    }
</style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen relative flex flex-col overflow-y-auto">
<!-- Dynamic Backdrop Slideshow (hidden until JS loads images) -->
<div id="backdropSlideshow" class="fixed inset-0 z-0 hidden">
  <div id="backdropA" class="backdrop-slide opacity-0"></div>
  <div id="backdropB" class="backdrop-slide opacity-0"></div>
</div>
<!-- Cinematic Background Grid (fallback when TMDB slideshow not available) -->
<div id="staticPosterGrid" class="fixed inset-0 z-0">
    <div class="absolute inset-0 bg-gradient-to-br from-black via-baltic-blue/20 to-black"></div>
</div>
<!-- Dark Overlay -->
<div class="fixed inset-0 z-10 cinematic-overlay"></div>
<!-- Main Content Container -->
<main class="relative z-20 flex-1 flex flex-col items-center justify-center px-4">
<!-- Login Card -->
<div class="w-full max-w-[440px] login-glass-card rounded-xl p-8 shadow-2xl flex flex-col items-center">
<!-- Logo Section -->
<div class="mb-8 flex flex-col items-center">
<img id="loginLogo" alt="Logo" class="h-32 w-auto object-contain border-none mb-2 hidden"/>
<h1 id="loginAppName" class="text-white text-2xl font-bold mt-4 tracking-tight text-center">WebServarr</h1>
</div>
<!-- Login Form -->
<form id="loginForm" class="w-full space-y-5">
<div class="flex flex-col gap-1.5">
<label class="text-white/80 text-sm font-medium px-1">Username</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-white/40 group-focus-within:text-primary text-[20px]">person</span>
<input id="username" name="username" class="w-full bg-white/5 border border-white/10 rounded-lg py-3 pl-10 pr-4 text-white placeholder:text-white/30 focus:outline-none focus:ring-2 focus:ring-primary/40 focus:border-primary transition-all" placeholder="admin" type="text" required/>
</div>
</div>
<div class="flex flex-col gap-1.5">
<div class="flex justify-between items-center px-1">
<label class="text-white/80 text-sm font-medium">Password</label>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-white/40 group-focus-within:text-primary text-[20px]">lock</span>
<input id="password" name="password" class="w-full bg-white/5 border border-white/10 rounded-lg py-3 pl-10 pr-4 text-white placeholder:text-white/30 focus:outline-none focus:ring-2 focus:ring-primary/40 focus:border-primary transition-all" placeholder="••••••••" type="password" required/>
</div>
</div>
<button type="submit" class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3.5 rounded-lg transition-all shadow-lg shadow-primary/20 active:scale-[0.98]">
                    Sign In
                </button>
<!-- Divider -->
<div class="flex items-center gap-4 py-2">
<div class="h-[1px] flex-1 bg-white/10"></div>
<span class="text-white/30 text-[10px] font-bold uppercase tracking-widest">Or continue with</span>
<div class="h-[1px] flex-1 bg-white/10"></div>
</div>
<!-- Plex SSO Button -->
<button id="plexLoginBtn" class="w-full bg-[#E5A00D] hover:bg-[#cc8f0c] text-black font-bold py-3 rounded-lg flex items-center justify-center gap-2 transition-all active:scale-[0.98]" type="button">
<span class="text-sm font-medium">Sign in with</span>
<span class="font-black text-xl tracking-tight leading-none uppercase" style="font-family: 'Arial Black', 'Helvetica Neue', sans-serif">PLEX</span>
</button>
<!-- Authentik SSO Button (hidden by default, shown when configured) -->
<button id="authentikLoginBtn" class="hidden w-full py-3 rounded-lg font-semibold text-white bg-cornflower-ocean hover:bg-steel-blue transition-colors flex items-center justify-center gap-2" type="button">
    <span class="text-sm font-medium">Sign in with</span>
    <span class="font-black tracking-tight leading-none uppercase" style="font-family: 'Arial Black', 'Helvetica Neue', sans-serif">PLEX</span>
    <span class="text-sm font-medium">via Authentik</span>
</button>
</form>
</div>
</main>
<!-- Footer Links -->
<footer class="relative z-20 p-8 flex flex-col md:flex-row items-center justify-center gap-6 md:gap-10 text-white/40 text-xs font-medium uppercase tracking-widest">
<a class="transition-colors flex items-center gap-1.5 hover:text-[#BEEEF4]" href="#">
<span class="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.6)]"></span>
            Status
        </a>
<a class="transition-colors hover:text-[#BEEEF4]" href="#">Documentation</a>
<a class="transition-colors hover:text-[#BEEEF4]" href="#">Privacy Policy</a>
<p class="hidden md:block opacity-30 cursor-default">|</p>
<p class="opacity-50">© 2026 WebServarr</p>
</footer>

<script>
// WebServarr - Login Logic

// --- Helper: show login error message ---
function showLoginError(msg) {
    var errorDiv = document.getElementById('loginError');
    if (!errorDiv) {
        errorDiv = document.createElement('div');
        errorDiv.id = 'loginError';
        errorDiv.className = 'text-red-400 text-sm text-center mt-2';
        var form = document.getElementById('loginForm');
        if (form) form.appendChild(errorDiv);
    }
    errorDiv.textContent = msg;
    setTimeout(function() { errorDiv.textContent = ''; }, 5000);
}

// --- Helper: complete Plex PIN auth (poll callback) ---
async function completePlexAuth(pinId) {
    try {
        var resp = await fetch('/auth/plex-callback', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ pin_id: pinId }),
        });
        if (!resp.ok) {
            var err = await resp.json();
            if (err.detail && err.detail.indexOf('not yet authorized') !== -1) {
                // PIN not linked yet — retry
                setTimeout(function() { completePlexAuth(pinId); }, 2000);
                return;
            }
            throw new Error(err.detail || 'Authentication failed');
        }
        window.location.href = '/';
    } catch (e) {
        showLoginError('Plex authentication failed: ' + e.message);
    }
}

document.addEventListener('DOMContentLoaded', async function() {
    // --- Handle mobile return from Plex auth ---
    var urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('plex_auth') === 'complete') {
        var pinId = sessionStorage.getItem('plex_pin_id');
        if (pinId) {
            sessionStorage.removeItem('plex_pin_id');
            completePlexAuth(parseInt(pinId, 10));
            return; // Don't load the rest of the page
        }
    }

    // --- Rotating TMDB Backgrounds ---
    (async function() {
        try {
            var resp = await fetch('/api/integrations/backgrounds');
            if (!resp.ok) return;
            var urls = await resp.json();
            if (!Array.isArray(urls) || urls.length === 0) return;

            // Shuffle the array
            for (var i = urls.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var tmp = urls[i]; urls[i] = urls[j]; urls[j] = tmp;
            }

            var slideshow = document.getElementById('backdropSlideshow');
            var slideA = document.getElementById('backdropA');
            var slideB = document.getElementById('backdropB');
            var staticGrid = document.getElementById('staticPosterGrid');
            var currentIndex = 0;
            var activeSlide = 'A';

            // Preload an image and return a promise
            function preload(url) {
                return new Promise(function(resolve, reject) {
                    var img = new Image();
                    img.onload = function() { resolve(url); };
                    img.onerror = function() { reject(); };
                    img.src = url;
                });
            }

            // Load first image
            var firstUrl = urls[0];
            await preload(firstUrl);

            // Hide static grid, show slideshow
            if (staticGrid) staticGrid.style.display = 'none';
            slideshow.classList.remove('hidden');
            slideA.style.backgroundImage = 'url(' + firstUrl + ')';
            slideA.style.opacity = '1';
            currentIndex = 1;

            // Rotate every 10 seconds
            setInterval(async function() {
                if (urls.length < 2) return;
                var nextUrl = urls[currentIndex % urls.length];
                currentIndex++;

                try {
                    await preload(nextUrl);
                } catch(e) { return; }

                if (activeSlide === 'A') {
                    slideB.style.backgroundImage = 'url(' + nextUrl + ')';
                    slideB.style.opacity = '1';
                    slideA.style.opacity = '0';
                    activeSlide = 'B';
                } else {
                    slideA.style.backgroundImage = 'url(' + nextUrl + ')';
                    slideA.style.opacity = '1';
                    slideB.style.opacity = '0';
                    activeSlide = 'A';
                }
            }, 10000);

        } catch(e) {
            // Fetch failed — static grid stays visible
        }
    })();

    // Apply branding from theme
    var theme = window.WEBSERVARR_THEME || {};
    if (theme.app_name) {
        var el = document.getElementById('loginAppName');
        if (el) el.textContent = theme.app_name;
    }
    // Show branding logo if configured
    if (theme.logo_url) {
        var logoEl = document.getElementById('loginLogo');
        if (logoEl) {
            logoEl.src = theme.logo_url;
            logoEl.classList.remove('hidden');
        }
    }

    // --- Auth method visibility ---
    var authMethods = theme.auth_methods || {};
    // If auth_methods not loaded yet (no cache), default to showing simple auth
    var hasAnyAuthConfig = authMethods.simple !== undefined || authMethods.plex !== undefined || authMethods.authentik !== undefined;

    // Hide Plex button if not configured
    if (!authMethods.plex) {
        var plexBtn = document.getElementById('plexLoginBtn');
        if (plexBtn) plexBtn.classList.add('hidden');
    }

    // Show Authentik button if configured
    if (authMethods.authentik) {
        var authentikBtn = document.getElementById('authentikLoginBtn');
        if (authentikBtn) {
            authentikBtn.classList.remove('hidden');
            authentikBtn.addEventListener('click', function() {
                window.location.href = '/auth/login';
            });
        }
    }

    // Hide simple auth form elements only if explicitly disabled (not when auth_methods missing)
    if (hasAnyAuthConfig && !authMethods.simple) {
        var formEl = document.getElementById('loginForm');
        var children = formEl.children;
        for (var i = 0; i < children.length; i++) {
            var child = children[i];
            // Keep SSO buttons visible, hide form inputs and dividers
            if (child.id !== 'plexLoginBtn' && child.id !== 'authentikLoginBtn') {
                child.style.display = 'none';
            }
        }
    }

    // If already authenticated, redirect to dashboard
    try {
        var authResp = await fetch('/auth/check-session');
        var authData = await authResp.json();
        if (authData.authenticated) {
            window.location.href = '/';
            return;
        }
    } catch (e) { /* Not authenticated, show login form */ }

    // Handle login form submission
    var loginForm = document.getElementById('loginForm');
    loginForm.addEventListener('submit', async function(e) {
        e.preventDefault();

        var username = document.getElementById('username').value;
        var password = document.getElementById('password').value;

        try {
            var response = await fetch('/auth/simple-login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username: username, password: password })
            });

            var data = await response.json();

            if (response.ok && data.success) {
                // Login successful, redirect to dashboard
                window.location.href = data.redirect || '/';
            } else {
                showLoginError(data.detail || 'Login failed. Please check your credentials.');
            }
        } catch (error) {
            showLoginError('Login error: ' + error.message);
        }
    });

    // --- Plex login via direct PIN-based OAuth ---
    document.getElementById('plexLoginBtn').addEventListener('click', async function() {
        var btn = this;
        var originalChildren = [];
        while (btn.firstChild) {
            originalChildren.push(btn.removeChild(btn.firstChild));
        }
        btn.disabled = true;
        btn.textContent = 'Connecting to Plex...';

        try {
            var resp = await fetch('/auth/plex-start', { method: 'POST' });
            if (!resp.ok) {
                var err = await resp.json();
                throw new Error(err.detail || 'Failed to start Plex auth');
            }
            var data = await resp.json();

            // Desktop: popup, Mobile: redirect
            var isMobile = /Mobi|Android/i.test(navigator.userAgent) || window.innerWidth < 768;

            if (isMobile) {
                sessionStorage.setItem('plex_pin_id', String(data.pin_id));
                window.location.href = data.auth_url;
            } else {
                var popup = window.open(data.auth_url, 'PlexAuth', 'width=800,height=600');
                window.addEventListener('message', function handler(e) {
                    if (e.data && e.data.type === 'plex-auth-complete') {
                        window.removeEventListener('message', handler);
                        if (popup && !popup.closed) popup.close();
                        completePlexAuth(data.pin_id);
                    }
                });
                // Fallback: poll in case popup closes without postMessage
                var pollInterval = setInterval(function() {
                    if (popup && popup.closed) {
                        clearInterval(pollInterval);
                        completePlexAuth(data.pin_id);
                    }
                }, 1000);
            }
        } catch (e) {
            btn.disabled = false;
            // Restore original button children
            btn.textContent = '';
            for (var i = 0; i < originalChildren.length; i++) {
                btn.appendChild(originalChildren[i]);
            }
            showLoginError(e.message);
        }
    });
});
</script>

</body></html>
