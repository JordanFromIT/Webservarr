# Optional Authentik overlay for OIDC authentication.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.authentik.yml up -d
#
# After starting, configure Authentik at http://localhost:9000, then add the
# Authentik URL, Client ID, Client Secret, and App Slug in the WebServarr
# Settings > System > Authentication panel.
# See docs/authentik.md for the full setup guide.
#
# Required environment variables (create a .env file):
#   AUTHENTIK_SECRET_KEY  — generate with: openssl rand -base64 32
#   PG_PASS              — any strong password

services:
  postgresql:
    image: postgres:16-alpine
    container_name: webservarr-postgresql
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${PG_USER:-authentik}
      - POSTGRES_PASSWORD=${PG_PASS:?database password required}
      - POSTGRES_DB=${PG_DB:-authentik}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 5s
    volumes:
      - postgres-data:/var/lib/postgresql/data

  authentik-server:
    image: ${AUTHENTIK_IMAGE:-ghcr.io/goauthentik/server}:${AUTHENTIK_TAG:-2026.2.1}
    container_name: webservarr-authentik
    restart: unless-stopped
    command: server
    ports:
      - "9000:9000"
      - "9443:9443"
    environment:
      - AUTHENTIK_SECRET_KEY=${AUTHENTIK_SECRET_KEY:?secret key required}
      - AUTHENTIK_POSTGRESQL__HOST=postgresql
      - AUTHENTIK_POSTGRESQL__USER=${PG_USER:-authentik}
      - AUTHENTIK_POSTGRESQL__NAME=${PG_DB:-authentik}
      - AUTHENTIK_POSTGRESQL__PASSWORD=${PG_PASS}
    volumes:
      - authentik-data:/data
      - authentik-templates:/templates
    depends_on:
      postgresql:
        condition: service_healthy

  authentik-worker:
    image: ${AUTHENTIK_IMAGE:-ghcr.io/goauthentik/server}:${AUTHENTIK_TAG:-2026.2.1}
    container_name: webservarr-authentik-worker
    restart: unless-stopped
    command: worker
    user: root
    environment:
      - AUTHENTIK_SECRET_KEY=${AUTHENTIK_SECRET_KEY:?secret key required}
      - AUTHENTIK_POSTGRESQL__HOST=postgresql
      - AUTHENTIK_POSTGRESQL__USER=${PG_USER:-authentik}
      - AUTHENTIK_POSTGRESQL__NAME=${PG_DB:-authentik}
      - AUTHENTIK_POSTGRESQL__PASSWORD=${PG_PASS}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - authentik-data:/data
      - authentik-templates:/templates
    depends_on:
      postgresql:
        condition: service_healthy

volumes:
  postgres-data:
  authentik-data:
  authentik-templates:
